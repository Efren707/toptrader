openapi: 3.0.3
info:
  title: TopTrader API
  version: "1.0"
  description: >
    REST API for the TopTrader stock trading simulator. Session-based auth
    (ADR 0004) — the SESSION cookie is set on register/login and must be sent
    (withCredentials) on every subsequent request. All errors use RFC 7807
    application/problem+json.
servers:
  - url: https://api.toptrader.example
    description: Production (placeholder domain, see ADR 0005)

security:
  - sessionAuth: []

paths:
  /auth/register:
    post:
      summary: Register a new account (US-1)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Account created; SESSION cookie set (auto-login), starting cash_balance = 500.00
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSummary"
        "400":
          description: Invalid email format or password under 8 characters
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "409":
          description: Email already in use
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"

  /auth/login:
    post:
      summary: Log in (US-2)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authenticated; SESSION cookie set
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSummary"
        "401":
          description: Invalid email/password (generic message, no user enumeration) or account temporarily locked
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"

  /auth/logout:
    post:
      summary: Log out, invalidating the current session
      responses:
        "204":
          description: Session invalidated

  /auth/session:
    get:
      summary: Get the current authenticated user (used on page load/refresh)
      responses:
        "200":
          description: Currently authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSummary"
        "401":
          description: No active session
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"

  /quotes/{ticker}:
    get:
      summary: Look up a stock quote (US-4)
      parameters:
        - name: ticker
          in: path
          required: true
          schema:
            type: string
          example: AAPL
      responses:
        "200":
          description: Current (or delayed) quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"
        "404":
          description: Unknown/invalid ticker
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "502":
          description: Market data provider unreachable or erroring
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"

  /trades/buy:
    post:
      summary: Buy whole shares (US-5)
      description: >
        Price is never client-supplied — the server fetches the current quote
        at the moment this request is processed and executes at that price.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TradeRequest"
      responses:
        "201":
          description: Trade executed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeResult"
        "400":
          description: Insufficient cash, or zero/negative/fractional quantity
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "404":
          description: Unknown ticker
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"

  /trades/sell:
    post:
      summary: Sell whole shares held (US-6)
      description: >
        Price is never client-supplied — the server fetches the current quote
        at the moment this request is processed and executes at that price.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TradeRequest"
      responses:
        "201":
          description: Trade executed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeResult"
        "400":
          description: Quantity greater than shares held, or zero/negative/fractional quantity
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "404":
          description: Unknown ticker, or no holding in that ticker
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"

  /portfolio:
    get:
      summary: View current holdings, cash, total value, and P&L (US-7, US-9)
      responses:
        "200":
          description: Current portfolio snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Portfolio"

  /transactions:
    get:
      summary: View transaction history (US-8)
      description: Full list of the logged-in user's own transactions, most recent first. Not paginated for MVP.
      responses:
        "200":
          description: Transaction list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"

components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: SESSION

  schemas:
    ProblemDetail:
      type: object
      description: RFC 7807 problem detail (Spring Boot's built-in ProblemDetail type)
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
          format: uri

    RegisterRequest:
      type: object
      required: [email, username, password]
      properties:
        email:
          type: string
          format: email
        username:
          type: string
        password:
          type: string
          format: password
          minLength: 8

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    UserSummary:
      type: object
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
        username:
          type: string

    Quote:
      type: object
      properties:
        ticker:
          type: string
        companyName:
          type: string
        price:
          type: number
          format: double
        asOf:
          type: string
          format: date-time

    TradeRequest:
      type: object
      required: [ticker, quantity]
      properties:
        ticker:
          type: string
        quantity:
          type: integer
          minimum: 1

    Holding:
      type: object
      properties:
        ticker:
          type: string
        quantity:
          type: integer
        averageCostBasis:
          type: number
          format: double
        currentPrice:
          type: number
          format: double
        marketValue:
          type: number
          format: double
        unrealizedGainLoss:
          type: number
          format: double

    Transaction:
      type: object
      properties:
        id:
          type: integer
          format: int64
        ticker:
          type: string
        side:
          type: string
          enum: [BUY, SELL]
        quantity:
          type: integer
        pricePerShare:
          type: number
          format: double
        totalAmount:
          type: number
          format: double
        executedAt:
          type: string
          format: date-time

    TradeResult:
      type: object
      properties:
        transaction:
          $ref: "#/components/schemas/Transaction"
        cashBalance:
          type: number
          format: double
        holding:
          $ref: "#/components/schemas/Holding"
          nullable: true
          description: Null when a sell fully liquidates the position

    Portfolio:
      type: object
      properties:
        cashBalance:
          type: number
          format: double
        holdings:
          type: array
          items:
            $ref: "#/components/schemas/Holding"
        totalValue:
          type: number
          format: double
        profitLoss:
          type: object
          properties:
            amount:
              type: number
              format: double
            percent:
              type: number
              format: double
