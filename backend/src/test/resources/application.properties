# Test-time datasource: same Postgres 17, same throwaway credentials as
# docker-compose.yml locally, and the CI workflow's postgres service
# container - both are just localhost:5432/toptrader.
spring.datasource.url=jdbc:postgresql://localhost:5432/toptrader
spring.datasource.username=toptrader
spring.datasource.password=toptrader

# No real Finnhub key in test env - FinnhubClient is always mocked (see QuoteControllerTest),
# this just satisfies MarketDataConfig's required property so the context can start.
toptrader.finnhub.api-key=test-key
