<div class="field" [class.field-error]="errorMessage()">
  @if (label()) {
    <label [for]="id">{{ label() }}</label>
  }
  <input
    [id]="id"
    [type]="type()"
    [placeholder]="placeholder()"
    [value]="value"
    [disabled]="disabled"
    (input)="handleInput($event)"
    (blur)="handleBlur()"
  />
  @if (errorMessage()) {
    <p class="error">{{ errorMessage() }}</p>
  } @else if (hint()) {
    <p class="hint">{{ hint() }}</p>
  }
</div>
